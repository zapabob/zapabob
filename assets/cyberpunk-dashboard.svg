<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dashTitle dashDesc">
  <title id="dashTitle">zapabob cyberpunk profile dashboard</title>
  <desc id="dashDesc">Cyberpunk dashboard showing language usage, star-ranked repositories, pinned repositories, and contribution calls to action for the zapabob GitHub profile.</desc>
  <defs>
    <linearGradient id="dashBg" x1="0" y1="0" x2="1280" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.5" stop-color="#090C1E"/>
      <stop offset="1" stop-color="#140B1D"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1AD6FF"/>
      <stop offset="1" stop-color="#00FFA3"/>
